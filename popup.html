<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MPVise — Stream Picker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      width: 300px;
      padding: 12px;
      -webkit-font-smoothing: antialiased;
    }

    header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid #21262d;
    }

    header img { width: 20px; height: 20px; object-fit: contain; }

    header h1 {
      font-size: 13px;
      font-weight: 600;
      color: #e6edf3;
      flex: 1;
      letter-spacing: -0.01em;
    }

    .badge {
      background: #1a7f37;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
      min-width: 20px;
      text-align: center;
    }

    .stream-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .stream-btn {
      width: 100%;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 12px;
      color: #c9d1d9;
      cursor: pointer;
      text-align: left;
      transition: background 0.12s ease, border-color 0.12s ease, transform 0.08s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .stream-btn:hover {
      background: #1c2332;
      border-color: #34d399;
      transform: translateY(-1px);
    }

    .stream-btn:active {
      transform: translateY(0);
      background: #21262d;
    }

    .stream-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .stream-icon {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #238636, #1a7f37);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stream-icon svg {
      width: 13px;
      height: 13px;
      fill: #fff;
    }

    .stream-info { flex: 1; min-width: 0; }

    .stream-label {
      font-size: 12px;
      font-weight: 600;
      color: #e6edf3;
    }

    .stream-url {
      font-size: 10px;
      color: #7d8590;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 210px;
      margin-top: 2px;
      font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    }

    .empty {
      text-align: center;
      color: #7d8590;
      font-size: 13px;
      padding: 20px 0;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 18px 0;
      color: #7d8590;
      font-size: 13px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid #30363d;
      border-top-color: #34d399;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <header>
    <img src="icons/play-button-48.png" alt="MPVise">
    <h1>MPVise Streams</h1>
    <span class="badge" id="badge">…</span>
  </header>

  <div class="stream-list" id="list">
    <div class="loading">
      <div class="spinner"></div>
      Loading…
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
