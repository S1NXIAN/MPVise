# [ CORE SETTINGS ]
# ────────────────────────────────────────────────────────────────────

# The port the daemon listens on.
port=8765

# The socket used for mpv IPC communication.
mpv_socket=/tmp/mpvise.sock


# [ PLAYER OVERRIDES ]
# ────────────────────────────────────────────────────────────────────
# NOTE: By default, MPVise respects your global mpv.conf and yt-dlp.conf.
# Uncomment these only if you want to override your system settings.

# Quality selection for yt-dlp.
# ytdlp_format=best[height<=1080]/best

# Custom arguments passed directly to mpv.
# mpv_args=--ontop --window-scale=0.5


# [ BROWSER & COOKIES ]
# ────────────────────────────────────────────────────────────────────

# Priority list for cookie extraction. 
# TIP: For maximum speed, list ONLY the browser you use most.
browsers=(chrome, chromium, brave, vivaldi, edge, firefox)


# [ ADVANCED BOILERPLATE ]
# ────────────────────────────────────────────────────────────────────
# High-quality rendering and hardware acceleration:
# mpv_args=--fs --hwdec=auto-safe --vo=gpu-next --profile=gpu-hq --scale=ewa_lanczossharp

# Unlocked resolution (4K/8K):
# ytdlp_format=bestvideo+bestaudio/best
